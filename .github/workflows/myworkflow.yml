name : Print Hello World

on : 
  push :
jobs : 
  print_macos:
    runs-on: macos-latest
    steps :
      - name : Print Hello World 
        run : echo "Hello World"
  
  print_ubuntu: 
    runs-on : ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps : 
      - name : Print Hello from Ubuntu
        run : echo "Hello from Ubuntu"
      - name : Install dependencies
        run : npm ci 
      - name : Run tests
        run : npm test
